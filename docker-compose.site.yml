services:
  backend:
    container_name: cargo-platform-backend
    image: cargo-platform-backend:latest
    environment:
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5174,http://localhost:5174
    ports: !override
      - "127.0.0.1:8000:8000"
    volumes: !override
      - cargo-platform-data:/data

  redis:
    container_name: cargo-platform-redis

  tenant-ui:
    container_name: cargo-platform-tenant-ui
    image: cargo-platform-tenant-ui:latest
    ports: !override
      - "0.0.0.0:5173:80"

  platform-admin-ui:
    container_name: cargo-platform-admin-ui
    image: cargo-platform-admin-ui:latest
    ports: !override
      - "127.0.0.1:5174:80"

volumes:
  cargo-platform-data:
    external: true
    name: cargo-platform-data
